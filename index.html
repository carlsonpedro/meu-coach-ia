<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AI Coach">
    
    <link rel="apple-touch-icon" href="https://images.unsplash.com/photo-1530541930197-ff16ac917b0e?w=180&h=180&fit=crop&q=80">

    <title>AI Triathlon Coach</title>
    <style>
        /* O resto do CSS idêntico ao anterior... */


        :root {
            --bg-color: #121214;
            --card-bg: #1c1c1e;
            --accent-color: #007aff;
            --success-color: #34c759;
            --text-color: #ffffff;
            --text-muted: #8e8e93;
            --border-color: #2c2c2e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            padding-bottom: 30px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid var(--border-color);
        }

        .card-title {
            font-size: 14px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .input-group {
            margin-bottom: 12px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        input {
            width: 100%;
            background-color: #2c2c2e;
            border: none;
            border-radius: 8px;
            padding: 10px;
            color: white;
            font-size: 15px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active {
            opacity: 0.7;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            text-align: center;
        }

        .metric-box {
            background: #2c2c2e;
            padding: 12px;
            border-radius: 8px;
        }

        .metric-value {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .metric-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        #status-message {
            font-size: 13px;
            text-align: center;
            color: var(--text-muted);
            margin-top: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Coach de Triatlo IA</h1>

    <div class="card">
        <div class="card-title">Configurações (Salvas localmente)</div>
        <div class="input-group">
            <label for="athlete-id">ID do Atleta (Intervals.icu)</label>
            <input type="text" id="athlete-id" placeholder="Ex: i12345">
        </div>
        <div class="input-group">
            <label for="intervals-key">API Key (Intervals.icu)</label>
            <input type="password" id="intervals-key" placeholder="Sua API key do Intervals">
        </div>
        <button onclick="saveSettings()">Salvar Configurações</button>
    </div>

    <div class="card">
        <div class="card-title">Status de Performance Atual</div>
        <div class="metrics-grid">
            <div class="metric-box">
                <div class="metric-value" id="metric-ctl">--</div>
                <div class="metric-label">Fitness (CTL)</div>
            </div>
            <div class="metric-box">
                <div class="metric-value" id="metric-atl">--</div>
                <div class="metric-label">Fadiga (ATL)</div>
            </div>
            <div class="metric-box">
                <div class="metric-value" id="metric-tsb">--</div>
                <div class="metric-label">Forma (TSB)</div>
            </div>
        </div>
        <button style="margin-top: 16px; background-color: var(--success-color);" onclick="fetchIntervalsData()">Sincronizar Dados</button>
        <div id="status-message"></div>
    </div>
</div>

<script>
    // Carregar configurações ao abrir o app
    window.onload = function() {
        if(localStorage.getItem('athleteId')) {
            document.getElementById('athlete-id').value = localStorage.getItem('athleteId');
        }
        if(localStorage.getItem('intervalsKey')) {
            document.getElementById('intervals-key').value = localStorage.getItem('intervalsKey');
        }
        if(localStorage.getItem('athleteId') && localStorage.getItem('intervalsKey')) {
            fetchIntervalsData(); // Sincroniza automaticamente se já tiver as chaves
        }
    };

    function saveSettings() {
        const athleteId = document.getElementById('athlete-id').value.trim();
        const intervalsKey = document.getElementById('intervals-key').value.trim();
        
        localStorage.setItem('athleteId', athleteId);
        localStorage.setItem('intervalsKey', intervalsKey);
        
        showStatus('Configurações salvas com sucesso!', 'var(--success-color)');
    }

    function showStatus(text, color) {
        const el = document.getElementById('status-message');
        el.innerText = text;
        el.style.color = color || 'var(--text-muted)';
    }

    async function fetchIntervalsData() {
        const athleteId = localStorage.getItem('athleteId');
        const intervalsKey = localStorage.getItem('intervalsKey');

        if (!athleteId || !intervalsKey) {
            showStatus('Por favor, configure o ID e a API Key primeiro.', '#ff3b30');
            return;
        }

        showStatus('Buscando dados do Intervals.icu...', 'var(--accent-color)');

        // O Intervals exige Autenticação Básica (Basic Auth). O usuário é 'athlete' e a senha é a API Key.
        const authString = btoa(`athlete:${intervalsKey}`);
        
        try {
            // Buscando o status de wellness/atleta mais recente do Intervals
            // Essa URL traz o resumo mais recente incluindo fitness, fadiga, etc.
            const response = await fetch(`https://intervals.icu/api/v1/athlete/${athleteId}/wellness`, {
                method: 'GET',
                headers: {
                    'Authorization': `Basic ${authString}`
                }
            });

            if (!response.ok) {
                throw new Error('Falha na autenticação ou ID incorreto.');
            }

            const data = await response.json();
            
            // Como o endpoint retorna uma lista de dias, pegamos o registro mais recente (hoje)
            if (data && data.length > 0) {
                const latest = data[data.length - 1];
                
                // Atualiza a tela com os dados reais calculados pelo Intervals.icu
                document.getElementById('metric-ctl').innerText = Math.round(latest.ctl || 0);
                document.getElementById('metric-atl').innerText = Math.round(latest.atl || 0);
                document.getElementById('metric-tsb').innerText = Math.round(latest.tsb || 0);
                
                showStatus('Dados atualizados com sucesso!', 'var(--success-color)');
            } else {
                showStatus('Nenhum dado encontrado para o período recente.', '#ff9500');
            }

        } catch (error) {
            console.error(error);
            showStatus(`Erro: ${error.message}`, '#ff3b30');
        }
    }
</script>

</body>
</html>
