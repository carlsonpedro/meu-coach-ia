<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AI Coach">
    <link rel="apple-touch-icon" href="https://images.unsplash.com/photo-1530541930197-ff16ac917b0e?w=180&h=180&fit=crop&q=80">

    <title>AI Triathlon Coach</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1c1c1e;
            --accent-color: #007aff;
            --success-color: #34c759;
            --text-color: #ffffff;
            --text-muted: #8e8e93;
            --border-color: #2c2c2e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            padding-bottom: 40px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid var(--border-color);
        }

        .card-title {
            font-size: 14px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .input-group {
            margin-bottom: 12px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        input, select, textarea {
            width: 100%;
            background-color: #2c2c2e;
            border: none;
            border-radius: 8px;
            padding: 10px;
            color: white;
            font-size: 15px;
            box-sizing: border-box;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            height: 60px;
        }

        button {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            text-align: center;
        }

        .metric-box {
            background: #2c2c2e;
            padding: 12px;
            border-radius: 8px;
        }

        .metric-value {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .metric-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        #status-message {
            font-size: 13px;
            text-align: center;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .chat-area {
            height: 260px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            background: #151517;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.4;
        }

        .message.user {
            background-color: var(--accent-color);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.coach {
            background-color: #2c2c2e;
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .chat-input-container {
            display: flex;
            gap: 8px;
        }

        .chat-input-container input {
            flex: 1;
        }

        .chat-input-container button {
            width: auto;
            padding: 0 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Coach de Triatlo IA</h1>

    <div class="card">
        <div class="card-title">Configurações</div>
        <div class="input-group">
            <label>ID do Atleta (Intervals.icu)</label>
            <input type="text" id="athlete-id" placeholder="Ex: 1234567">
        </div>
        <div class="input-group">
            <label>API Key (Intervals.icu)</label>
            <input type="password" id="intervals-key" placeholder="API key do Intervals">
        </div>
        <div class="input-group">
            <label>Gemini API Key</label>
            <input type="password" id="gemini-key" placeholder="Sua chave API do Gemini">
        </div>
        <button onclick="saveSettings()">Salvar Configurações</button>
    </div>

    <div class="card">
        <div class="card-title">Status de Performance Atual</div>
        <div class="metrics-grid">
            <div class="metric-box">
                <div class="metric-value" id="metric-ctl">--</div>
                <div class="metric-label">Fitness (CTL)</div>
            </div>
            <div class="metric-box">
                <div class="metric-value" id="metric-atl">--</div>
                <div class="metric-label">Fadiga (ATL)</div>
            </div>
            <div class="metric-box">
                <div class="metric-value" id="metric-tsb">--</div>
                <div class="metric-label">Forma (TSB)</div>
            </div>
        </div>
        <button style="margin-top: 16px; background-color: var(--success-color);" onclick="fetchIntervalsData()">Sincronizar Dados</button>
        <div id="status-message"></div>
    </div>

    <div class="card">
        <div class="card-title">Conversar com o Treinador</div>
        <div class="chat-area" id="chat-box">
            <div class="message coach">Olá! Sincronize os seus dados acima para eu analisar o seu nível atual e planear os seus próximos treinos de triatlo.</div>
        </div>
        <div class="chat-input-container">
            <input type="text" id="user-input" placeholder="Fale com o coach..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Enviar Treino Planeado para o Garmin</div>
        <div class="form-row">
            <div class="input-group">
                <label>Data do Treino</label>
                <input type="date" id="workout-date">
            </div>
            <div class="input-group">
                <label>Modalidade</label>
                <select id="workout-type">
                    <option value="Run">Corrida</option>
                    <option value="Ride">Ciclismo</option>
                    <option value="Swim">Natação</option>
                </select>
            </div>
        </div>
        <div class="input-group">
            <label>Nome do Treino</label>
            <input type="text" id="workout-name" placeholder="Ex: Tiros de Limiar Z4">
        </div>
        <div class="input-group">
            <label>Estrutura / Descrição do Treino</label>
            <textarea id="workout-desc" placeholder="Ex: 10m aquecimento + 4x 5m Z4 com 2m rec..."></textarea>
        </div>
        <button style="background-color: #ff9500;" onclick="scheduleWorkout()">Agendar no Calendário Garmin</button>
    </div>
</div>

<script>
    let currentMetrics = { ctl: '--', atl: '--', tsb: '--' };

    window.onload = function() {
        if(localStorage.getItem('athleteId')) document.getElementById('athlete-id').value = localStorage.getItem('athleteId');
        if(localStorage.getItem('intervalsKey')) document.getElementById('intervals-key').value = localStorage.getItem('intervalsKey');
        if(localStorage.getItem('geminiKey')) document.getElementById('gemini-key').value = localStorage.getItem('geminiKey');
        
        // Define a data de hoje por defeito no agendador
        const hoje = new Date().toISOString().split('T')[0];
        document.getElementById('workout-date').value = hoje;

        if(localStorage.getItem('athleteId') && localStorage.getItem('intervalsKey')) {
            fetchIntervalsData();
        }
    };

    function saveSettings() {
        localStorage.setItem('athleteId', document.getElementById('athlete-id').value.trim());
        localStorage.setItem('intervalsKey', document.getElementById('intervals-key').value.trim());
        localStorage.setItem('geminiKey', document.getElementById('gemini-key').value.trim());
        showStatus('Configurações salvas com sucesso!', 'var(--success-color)');
    }

    function showStatus(text, color) {
        const el = document.getElementById('status-message');
        el.innerText = text;
        el.style.color = color || 'var(--text-muted)';
    }


    function appendMessage(sender, text) {
        const chatBox = document.getElementById('chat-box');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
    async function fetchIntervalsData() {
        const athleteId = localStorage.getItem('athleteId');
        const intervalsKey = localStorage.getItem('intervalsKey');

        if (!athleteId || !intervalsKey) {
            showStatus('Por favor, configure as chaves primeiro.', '#ff3b30');
            return;
        }

        showStatus('A buscar dados do Intervals.icu...', 'var(--accent-color)');
        const authString = btoa(`API_KEY:${intervalsKey}`);
        
        try {
            // Voltamos ao endpoint correto de wellness
            const response = await fetch(`https://intervals.icu/api/v1/athlete/${athleteId}/wellness`, {
                method: 'GET',
                headers: { 'Authorization': `Basic ${authString}` }
            });

            if (!response.ok) throw new Error('Falha na autenticação ou erro na API.');

            const data = await response.json();
            
            if (data && data.length > 0) {
                let encontrado = false;

                // Percorremos o array de trás para a frente para ignorar dias futuros vazios
                // e encontrar o dia mais recente com métricas reais calculadas
                for (let i = data.length - 1; i >= 0; i--) {
                    const dia = data[i];
                    // Mapeia de forma segura quer venha como ctl/atl ou ctlLoad/atlLoad
                    const ctlVal = dia.ctl !== undefined ? dia.ctl : dia.ctlLoad;
                    const atlVal = dia.atl !== undefined ? dia.atl : dia.atlLoad;

                    if (ctlVal !== undefined && ctlVal > 0) {
                        currentMetrics.ctl = Math.round(ctlVal);
                        currentMetrics.atl = Math.round(atlVal !== undefined ? atlVal : 0);
                        currentMetrics.tsb = currentMetrics.ctl - currentMetrics.atl;
                        encontrado = true;
                        break;
                    }
                }

                // Fallback de segurança se todo o histórico estiver a zeros
                if (!encontrado) {
                    const ultimo = data[data.length - 1];
                    currentMetrics.ctl = Math.round(ultimo.ctl || ultimo.ctlLoad || 0);
                    currentMetrics.atl = Math.round(ultimo.atl || ultimo.atlLoad || 0);
                    currentMetrics.tsb = currentMetrics.ctl - currentMetrics.atl;
                }

                document.getElementById('metric-ctl').innerText = currentMetrics.ctl;
                document.getElementById('metric-atl').innerText = currentMetrics.atl;
                document.getElementById('metric-tsb').innerText = currentMetrics.tsb;
                
                showStatus('Dados atualizados com sucesso!', 'var(--success-color)');
                
                appendMessage('coach', `Métricas sincronizadas! O seu Fitness (CTL) está em ${currentMetrics.ctl}, Fadiga (ATL) em ${currentMetrics.atl} e Forma (TSB) em ${currentMetrics.tsb}. Qual é o plano ou objetivo para os próximos treinos?`);
            } else {
                throw new Error('Nenhum dado de histórico encontrado.');
            }
            
        } catch (error) {
            showStatus(`Erro: ${error.message}`, '#ff3b30');
        }
    }


    async function sendMessage() {
        const inputEl = document.getElementById('user-input');
        const userText = inputEl.value.trim();
        const geminiKey = localStorage.getItem('geminiKey');

        if (!userText) return;
        if (!geminiKey) {
            alert('Por favor, insira e salve a sua Gemini API Key nas configurações.');
            return;
        }

        appendMessage('user', userText);
        inputEl.value = '';

        const systemInstruction = `És um treinador de triatlo de elite com IA, inteligente e adaptativo como o Humango. O teu atleta utiliza um Garmin Forerunner 255 para corrida/natação e treina ciclismo no MyWhoosh (gravando também pelo Garmin). 
        As métricas atuais dele capturadas do Intervals.icu são: Fitness (CTL): ${currentMetrics.ctl}, Fadiga (ATL): ${currentMetrics.atl}, Forma (TSB): ${currentMetrics.tsb}.
        Deves dar feedbacks curtos, motivadores e focados em eficiência de endurance. Sempre que planeares um treino estruturado, sugere blocos claros de zonas (ex: Z2, Z4). Responde sempre em português claro.`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: userText }] }],
                    systemInstruction: { parts: [{ text: systemInstruction }] }
                })
            });

            const data = await response.json();
            const coachReply = data.candidates[0].content.parts[0].text;
            appendMessage('coach', coachReply);

        } catch (error) {
            console.error(error);
            appendMessage('coach', 'Erro ao conectar com o servidor do treinador. Verifica a tua API Key.');
        }
    }

    async function scheduleWorkout() {
        const athleteId = localStorage.getItem('athleteId');
        const intervalsKey = localStorage.getItem('intervalsKey');
        
        const date = document.getElementById('workout-date').value;
        const type = document.getElementById('workout-type').value;
        const name = document.getElementById('workout-name').value.trim();
        const desc = document.getElementById('workout-desc').value.trim();

        if (!athleteId || !intervalsKey) {
            alert('Configure as credenciais primeiro.');
            return;
        }
        if (!name || !desc) {
            alert('Por favor, preencha o nome e a descrição do treino.');
            return;
        }

        const authString = btoa(`API_KEY:${intervalsKey}`);
        const workoutData = {
            category: "WORKOUT",
            type: type,
            start_date_local: date + "T00:00:00",
            name: name,
            description: desc
        };

        try {
            const response = await fetch(`https://intervals.icu/api/v1/athlete/${athleteId}/events`, {
                method: 'POST',
                headers: { 
                    'Authorization': `Basic ${authString}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(workoutData)
            });

            if (response.ok) {
                alert('Treino agendado com sucesso! Daqui a instantes estará sincronizado no seu calendário Garmin.');
                document.getElementById('workout-name').value = '';
                document.getElementById('workout-desc').value = '';
            } else {
                throw new Error('Falha ao criar o evento no Intervals.icu.');
            }
        } catch (error) {
            alert(`Erro ao agendar: ${error.message}`);
        }
    }
</script>

</body>
</html>
