<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AI Coach">
    <link rel="apple-touch-icon" href="https://images.unsplash.com/photo-1530541930197-ff16ac917b0e?w=180&h=180&fit=crop&q=80">
    <title>AI Triathlon Coach</title>
    <style>
        :root {
            --bg-color: #0f141c;
            --card-bg: #1a222d;
            --accent-color: #00c7ff;
            --success-color: #34c759;
            --danger-color: #ff3b30;
            --text-color: #f5f7fa;
            --text-muted: #8e9aa8;
            --border-color: #253140;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 16px; padding-bottom: 60px; }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { font-size: 22px; font-weight: 700; margin-bottom: 16px; text-align: center; color: var(--text-color); }
        .card { background-color: var(--card-bg); border-radius: 14px; padding: 16px; margin-bottom: 16px; border: 1px solid var(--border-color); }
        .card-title { font-size: 12px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; font-weight: 600; letter-spacing: 0.5px; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
        input, select, textarea { width: 100%; background-color: #222d3a; border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; color: white; font-size: 14px; box-sizing: border-box; outline: none; }
        textarea { resize: vertical; height: 60px; }
        button { width: 100%; background-color: var(--accent-color); color: #000; border: none; border-radius: 8px; padding: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }
        .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: center; }
        .metric-box { background: #222d3a; padding: 12px; border-radius: 10px; border: 1px solid var(--border-color); }
        .metric-value { font-size: 24px; font-weight: 700; margin-bottom: 20px; color: var(--text-color); margin-bottom: 2px; }
        .metric-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
        #status-message { font-size: 12px; text-align: center; color: var(--text-muted); margin-top: 10px; font-weight: 500; }
        .chat-area { height: 280px; overflow-y: auto; border: 1px solid var(--border-color); border-radius: 12px; padding: 12px; background: #121820; margin-bottom: 12px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 85%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
        .message.user { background-color: var(--accent-color); color: #000; align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 500; }
        .message.coach { background-color: #253140; color: var(--text-color); align-self: flex-start; border-bottom-left-radius: 4px; }
        .chat-input-container { display: flex; gap: 8px; }
        .chat-input-container input { flex: 1; border-radius: 20px; padding: 10px 16px; }
        .chat-input-container button { width: auto; padding: 0 20px; border-radius: 20px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        details { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 16px; }
        summary { padding: 12px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text-muted); }
        .settings-content { padding: 15px; display: flex; flex-direction: column; gap: 10px; border-top: 1px solid var(--border-color); }
        .clear-btn { background: none; border: none; color: var(--danger-color); font-size: 11px; cursor: pointer; font-weight: bold; float: right; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <h1>Coach de Triatlo IA</h1>

    <details>
        <summary>⚙️ Configurações de Integração</summary>
        <div class="settings-content">
            <div class="input-group">
                <label>ID do Atleta (Intervals.icu)</label>
                <input type="text" id="athlete-id" placeholder="Ex: 1234567">
            </div>
            <div class="input-group">
                <label>API Key (Intervals.icu)</label>
                <input type="password" id="intervals-key" placeholder="API key do Intervals">
            </div>
            <div class="input-group">
                <label>Gemini API Key</label>
                <input type="password" id="gemini-key" placeholder="Sua chave API do Gemini">
            </div>
            <button style="background-color: var(--success-color);" onclick="saveSettings()">Salvar Configurações</button>
        </div>
    </details>

    <div class="card">
        <div class="card-title">Status de Performance Atual</div>
        <div class="metrics-grid">
            <div class="metric-box">
                <div class="metric-value" id="metric-ctl">--</div>
                <div class="metric-label">Fitness (CTL)</div>
            </div>
            <div class="metric-box">
                <div class="metric-value" id="metric-atl">--</div>
                <div class="metric-label">Fadiga (ATL)</div>
            </div>
            <div class="metric-box">
                <div class="metric-value" id="metric-tsb">--</div>
                <div class="metric-label">Forma (TSB)</div>
            </div>
        </div>
        <button style="margin-top: 16px; background-color: #222d3a; color: var(--accent-color); border: 1px solid var(--border-color);" onclick="fetchIntervalsData()">Sincronizar Dados</button>
        <div id="status-message"></div>
    </div>

    <div class="card">
        <div class="card-title">
            Conversar com o Treinador
            <button class="clear-btn" onclick="clearChat()">Limpar</button>
        </div>
        <div class="chat-area" id="chat-box">
            <div class="message coach">Olá! Sincronize os seus dados acima para eu analisar o seu nível atual e planejar a sua planilha de triatlo.</div>
        </div>
        <div class="chat-input-container">
            <input type="text" id="user-input" placeholder="Fale com o coach..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()">➔</button>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Agendamento Manual Extra</div>
        <div class="form-row">
            <div class="input-group">
                <label>Data do Treino</label>
                <input type="date" id="workout-date">
            </div>
            <div class="input-group">
                <label>Modalidade</label>
                <select id="workout-type">
                    <option value="Run">Corrida</option>
                    <option value="Ride">Ciclismo</option>
                    <option value="Swim">Natação</option>
                </select>
            </div>
        </div>
        <div class="input-group">
            <label>Nome do Treino</label>
            <input type="text" id="workout-name" placeholder="Ex: Tiros de Limiar Z4">
        </div>
        <div class="input-group">
            <label>Estrutura / Descrição do Treino</label>
            <textarea id="workout-desc" placeholder="Ex: 10m aquecimento + 4x 5m Z4 com 2m rec..."></textarea>
        </div>
        <button style="background-color: #ff9500; color: #000;" onclick="scheduleWorkout()">Agendar Manual no Intervals</button>
    </div>
</div>

<script>
    let currentMetrics = { ctl: '--', atl: '--', tsb: '--' };
    let chatHistory = [];

    window.onload = function() {
        if(localStorage.getItem('athleteId')) document.getElementById('athlete-id').value = localStorage.getItem('athleteId');
        if(localStorage.getItem('intervalsKey')) document.getElementById('intervals-key').value = localStorage.getItem('intervalsKey');
        if(localStorage.getItem('geminiKey')) document.getElementById('gemini-key').value = localStorage.getItem('geminiKey');
        
        document.getElementById('workout-date').value = new Date().toISOString().split('T')[0];

        if(localStorage.getItem('coachChatHistory')) {
            try {
                chatHistory = JSON.parse(localStorage.getItem('coachChatHistory'));
                const chatBox = document.getElementById('chat-box');
                chatBox.innerHTML = '';
                chatHistory.forEach(msg => {
                    appendMessage(msg.role === 'user' ? 'user' : 'coach', msg.parts[0].text.split('|||')[0]);
                });
            } catch (e) { chatHistory = []; }
        }

        if(localStorage.getItem('athleteId') && localStorage.getItem('intervalsKey')) {
            fetchIntervalsData();
        }
    };

    function saveSettings() {
        localStorage.setItem('athleteId', document.getElementById('athlete-id').value.trim());
        localStorage.setItem('intervalsKey', document.getElementById('intervals-key').value.trim());
        localStorage.setItem('geminiKey', document.getElementById('gemini-key').value.trim());
        showStatus('Configurações salvas com sucesso!', 'var(--success-color)');
    }

    function showStatus(text, color) {
        const el = document.getElementById('status-message');
        el.innerText = text;
        el.style.color = color || 'var(--text-muted)';
    }

    function appendMessage(sender, text) {
        const chatBox = document.getElementById('chat-box');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function fetchIntervalsData() {
        const athleteId = localStorage.getItem('athleteId');
        const intervalsKey = localStorage.getItem('intervalsKey');

        if (!athleteId || !intervalsKey) {
            showStatus('Por favor, configure as chaves primeiro.', '#ff3b30');
            return;
        }

        showStatus('A buscar dados do Intervals.icu...', 'var(--accent-color)');
        
        try {
            const response = await fetch(`https://intervals.icu/api/v1/athlete/${athleteId}/wellness`, {
                method: 'GET',
                headers: { 'Authorization': `Basic ${btoa(`API_KEY:${intervalsKey}`)}` }
            });

            if (!response.ok) throw new Error('Falha na autenticação ou erro na API.');
            const data = await response.json();
            
            if (data && data.length > 0) {
                let encontrado = false;
                for (let i = data.length - 1; i >= 0; i--) {
                    const dia = data[i];
                    const ctlVal = dia.ctl !== undefined ? dia.ctl : dia.ctlLoad;
                    const atlVal = dia.atl !== undefined ? dia.atl : dia.atlLoad;

                    if (ctlVal !== undefined && ctlVal > 0) {
                        currentMetrics.ctl = Math.round(ctlVal);
                        currentMetrics.atl = Math.round(atlVal !== undefined ? atlVal : 0);
                        currentMetrics.tsb = currentMetrics.ctl - currentMetrics.atl;
                        encontrado = true;
                        break;
                    }
                }

                if (!encontrado) {
                    const ultimo = data[data.length - 1];
                    currentMetrics.ctl = Math.round(ultimo.ctl || ultimo.ctlLoad || 0);
                    currentMetrics.atl = Math.round(ultimo.atl || ultimo.atlLoad || 0);
                    currentMetrics.tsb = currentMetrics.ctl - currentMetrics.atl;
                }

                document.getElementById('metric-ctl').innerText = currentMetrics.ctl;
                document.getElementById('metric-atl').innerText = currentMetrics.atl;
                document.getElementById('metric-tsb').innerText = currentMetrics.tsb;
                
                showStatus('Dados atualizados com sucesso!', 'var(--success-color)');
                appendMessage('coach', `Métricas sincronizadas! CTL: ${currentMetrics.ctl} | ATL: ${currentMetrics.atl} | TSB: ${currentMetrics.tsb}. Pronto para estruturar os próximos blocos.`);
            }
        } catch (error) { showStatus(`Erro: ${error.message}`, '#ff3b30'); }
    }

    async function sendMessage() {
        const inputEl = document.getElementById('user-input');
        const userText = inputEl.value.trim();
        const geminiKey = localStorage.getItem('geminiKey');

        if (!userText || !geminiKey) return;

        appendMessage('user', userText);
        inputEl.value = '';

        chatHistory.push({ role: "user", parts: [{ text: userText }] });
        let apiContents = JSON.parse(JSON.stringify(chatHistory.slice(-6)));

        const systemInstruction = `És um treinador de triatlo de elite com IA, inteligente e adaptativo como o Humango. O teu atleta utiliza um Garmin Forerunner 255 para corrida/natação e treina ciclismo no MyWhoosh.
        Métricas atuais no Intervals.icu: CTL: ${currentMetrics.ctl}, ATL: ${currentMetrics.atl}, TSB: ${currentMetrics.tsb}.
        Dá feedbacks curtos e focados em eficiência de endurance (Z2, Z4, etc). Responde sempre em português.
        REGRA CRÍTICA PARA PLANILHAS: Se sugerires um ou múltiplos treinos para os próximos dias, deves OBRIGATORIAMENTE anexar no final estrito da tua resposta o bloco de dados exatamente neste formato e com o separador de três barras (sem markdown, sem blocos de código extra):
        |||[{"date":"AAAA-MM-DD","type":"Run"|"Ride"|"Swim","name":"Nome Curto","desc":"Estrutura do treino"}]`;

        appendMessage('coach', '⏳ Analisando métricas e montando planilha...');
        const loadingDiv = document.getElementById('chat-box').lastChild;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.0-flash:generateContent?key=${geminiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: apiContents,
                    systemInstruction: { parts: [{ text: systemInstruction }] }
                })
            });

            const data = await response.json();
            if (loadingDiv) loadingDiv.remove();

            if (!response.ok) throw new Error(data.error?.message || 'Erro na API');

            const coachReply = data.candidates[0].content.parts[0].text;
            const partes = coachReply.split('|||');
            
            appendMessage('coach', partes[0].trim());

            if (partes.length > 1) {
                try {
                    const workoutsLote = JSON.parse(partes[1].trim());
                    await scheduleBatchWorkouts(workoutsLote);
                } catch (e) { console.error("Erro ao interpretar JSON de treinos", e); }
            }

            chatHistory.push({ role: "model", parts: [{ text: coachReply }] });
            localStorage.setItem('coachChatHistory', JSON.stringify(chatHistory));

        } catch (error) {
            if (loadingDiv) loadingDiv.remove();
            appendMessage('coach', `⚠️ Erro: ${error.message}`);
            chatHistory.pop();
        }
    }

    async function scheduleBatchWorkouts(workouts) {
        const athleteId = localStorage.getItem('athleteId');
        const intervalsKey = localStorage.getItem('intervalsKey');
        if (!athleteId || !intervalsKey) return;

        showStatus(`Agendando planilha de ${workouts.length} treinos...`, 'var(--accent-color)');
        
        for (const w of workouts) {
            try {
                await fetch(`https://intervals.icu/api/v1/athlete/${athleteId}/events`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Basic ${btoa(`API_KEY:${intervalsKey}`)}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        category: "WORKOUT",
                        type: w.type,
                        start_date_local: w.date + "T00:00:00",
                        name: w.name,
                        description: w.desc
                    })
                });
            } catch (err) { console.error("Erro no item do lote", err); }
        }
        showStatus('Planilha inteira enviada para o Garmin via Intervals! 🚀', 'var(--success-color)');
    }

    async function scheduleWorkout() {
        const athleteId = localStorage.getItem('athleteId');
        const intervalsKey = localStorage.getItem('intervalsKey');
        const date = document.getElementById('workout-date').value;
        const type = document.getElementById('workout-type').value;
        const name = document.getElementById('workout-name').value.trim();
        const desc = document.getElementById('workout-desc').value.trim();

        if (!athleteId || !intervalsKey || !name || !desc) {
            alert('Preencha os dados do formulário manual.');
            return;
        }

        try {
            const response = await fetch(`https://intervals.icu/api/v1/athlete/${athleteId}/events`, {
                method: 'POST',
                headers: { 'Authorization': `Basic ${btoa(`API_KEY:${intervalsKey}`)}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ category: "WORKOUT", type: type, start_date_local: date + "T00:00:00", name: name, description: desc })
            });
            if (response.ok) {
                alert('Treino individual agendado!');
                document.getElementById('workout-name').value = '';
                document.getElementById('workout-desc').value = '';
            }
        } catch (error) { alert(`Erro: ${error.message}`); }
    }

    function clearChat() {
        chatHistory = [];
        localStorage.removeItem('coachChatHistory');
        document.getElementById('chat-box').innerHTML = '<div class="message coach">Histórico limpo! Pronto para a próxima semana de treinos.</div>';
    }
</script>

</body>
</html>
