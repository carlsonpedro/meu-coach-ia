<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Triathlon Coach - Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0b0f17; color: #f1f5f9; }
        .message { padding: 12px; border-radius: 12px; margin-bottom: 10px; max-width: 90%; font-size: 14px; }
        .user { background: #0284c7; align-self: flex-end; margin-left: auto; }
        .coach { background: #1e293b; align-self: flex-start; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 99px; }
    </style>
</head>
<body class="p-4 min-h-screen">

<div class="max-w-lg mx-auto space-y-4">
    <header class="text-center py-2">
        <h1 class="text-2xl font-black tracking-tight">COACH <span class="text-sky-500">IA</span></h1>
    </header>

    <details class="bg-[#131a26] border border-[#1f293d] rounded-2xl p-4">
        <summary class="text-xs font-bold uppercase cursor-pointer text-slate-400">⚙️ Configurações (API Keys)</summary>
        <div class="mt-4 space-y-3">
            <input type="text" id="athlete-id" placeholder="ID do Atleta (Intervals)" class="w-full bg-[#0b0f17] border border-[#1f293d] rounded-lg p-2 text-sm">
            <input type="password" id="intervals-key" placeholder="API Key (Intervals)" class="w-full bg-[#0b0f17] border border-[#1f293d] rounded-lg p-2 text-sm">
            <input type="password" id="gemini-key" placeholder="Gemini API Key" class="w-full bg-[#0b0f17] border border-[#1f293d] rounded-lg p-2 text-sm">
            <textarea id="athlete-bio" placeholder="Restrições/Bio do atleta" class="w-full bg-[#0b0f17] border border-[#1f293d] rounded-lg p-2 text-sm"></textarea>
            <button onclick="saveSettings()" class="w-full bg-emerald-600 p-2 rounded-lg font-bold text-xs">SALVAR</button>
        </div>
    </details>

    <div id="status-message" class="text-center text-[10px] text-slate-500 uppercase"></div>

    <div class="bg-[#131a26] border border-[#1f293d] rounded-2xl p-4 h-96 flex flex-col">
        <div id="chat-box" class="flex-1 overflow-y-auto space-y-3 mb-4"></div>
        <div class="flex gap-2 chat-input-container">
            <input type="text" id="user-input" class="flex-1 bg-[#0b0f17] border border-[#1f293d] rounded-full px-4 py-2 text-sm" placeholder="Peça seu treino...">
            <button onclick="sendMessage()" class="bg-sky-600 px-4 rounded-full font-bold">➔</button>
        </div>
    </div>
    
    <div id="validation-card" class="bg-[#1e293b] border border-sky-900 rounded-2xl p-4 hidden">
        <h3 class="text-sm font-bold mb-2">📋 Validação de Treinos</h3>
        <div id="pending-workouts-list"></div>
        <button onclick="approvePendingWorkouts()" class="w-full bg-emerald-600 p-2 rounded-lg font-bold text-xs mt-2">APROVAR E ENVIAR PARA O INTERVALS</button>
    </div>
</div>

<script>
    // 🎯 MODELOS LIMITADOS APENAS AOS QUE FUNCIONAM NA SUA CONTA
    const modelList = ['gemini-2.5-flash', 'gemini-1.5-flash'];
    let pendingWorkoutsList = [];

    async function sendMessage() {
        const inputEl = document.getElementById('user-input');
        const userText = inputEl.value.trim();
        const geminiKey = localStorage.getItem('geminiKey');

        if (!userText || !geminiKey) return;

        inputEl.disabled = true;
        appendMessage('user', userText);
        inputEl.value = '';

        let success = false;
        let lastError = "";

        for (let model of modelList) {
            try {
                showStatus(`Tentando via ${model}...`, '#0ea5e9');
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${geminiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: userText }] }] })
                });

                if (response.ok) {
                    const data = await response.json();
                    const text = data.candidates[0].content.parts[0].text;
                    appendMessage('coach', text);
                    processResponseForWorkouts(text);
                    success = true;
                    showStatus('Resposta recebida.', '#10b981');
                    break;
                } else {
                    const err = await response.json();
                    lastError = `Modelo ${model} falhou: ${err.error.message}`;
                    console.warn(lastError);
                }
            } catch (e) {
                lastError = `Falha técnica no ${model}: ${e.message}`;
            }
        }

        if (!success) {
            appendMessage('coach', `🚨 **Erro de Conexão com o Google AI Studio:**\n\nTodos os modelos falharam na tentativa. Motivo do último erro:\n*${lastError}*\n\nPor favor, aguarde alguns segundos e tente enviar novamente.`);
            showStatus('Erro na requisição.', '#f43f5e');
        }

        inputEl.disabled = false;
    }

    function processResponseForWorkouts(text) {
        // Tentativa de extrair JSON para validação
        const match = text.match(/\[([\s\S]*?)\]/);
        if (match) {
            try {
                pendingWorkoutsList = JSON.parse(match[0]);
                renderPendingWorkouts();
            } catch (e) {
                console.error("Erro ao parsear treinos:", e);
            }
        }
    }

    function renderPendingWorkouts() {
        const card = document.getElementById('validation-card');
        const list = document.getElementById('pending-workouts-list');
        list.innerHTML = pendingWorkoutsList.map(w => `<div class="bg-black/20 p-2 rounded mb-2 text-xs">📅 ${w.date} - ${w.name}</div>`).join('');
        card.classList.remove('hidden');
    }

    function approvePendingWorkouts() {
        alert('Enviando para o Intervals...');
        // Lógica de upload aqui...
    }

    function saveSettings() {
        localStorage.setItem('athleteId', document.getElementById('athlete-id').value.trim());
        localStorage.setItem('intervalsKey', document.getElementById('intervals-key').value.trim());
        localStorage.setItem('geminiKey', document.getElementById('gemini-key').value.trim());
        localStorage.setItem('athleteBio', document.getElementById('athlete-bio').value.trim());
        alert('Configurações salvas!');
    }

    function appendMessage(sender, text) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        div.innerText = text;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function showStatus(text, color) {
        const el = document.getElementById('status-message');
        if (el) { el.innerText = text; el.style.color = color; }
    }
</script>
</body>
</html>
